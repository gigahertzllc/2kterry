name: Deploy Supabase Edge Function

on:
  workflow_dispatch:
  push:
    branches: [main]
    paths:
      - 'src/supabase/functions/server/**'

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: supabase/setup-cli@v1
        with:
          version: latest

      - name: Deploy Edge Function
        env:
          SUPABASE_ACCESS_TOKEN: ${{ secrets.SUPABASE_ACCESS_TOKEN }}
        run: |
          mkdir -p supabase/functions/make-server-832015f7
          cp src/supabase/functions/server/index.tsx supabase/functions/make-server-832015f7/index.ts
          cp src/supabase/functions/server/kv_store.tsx supabase/functions/make-server-832015f7/kv_store.ts
          cp src/supabase/functions/server/storage.tsx supabase/functions/make-server-832015f7/storage.ts
          sed -i 's/\.\/kv_store\.tsx/\.\/kv_store\.ts/g' supabase/functions/make-server-832015f7/index.ts
          sed -i 's/\.\/storage\.tsx/\.\/storage\.ts/g' supabase/functions/make-server-832015f7/index.ts
          supabase functions deploy make-server-832015f7 --project-ref dxquofsanirdfonsnrqu --no-verify-jwt
